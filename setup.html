<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" type="image/x-icon" href="img/favicon.ico"/>
  <link rel="icon" type="image/png" href="img/favicon.png"/>
  <title>Setup Admin – T.G.I COMO</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="apple-touch-icon.png"/>
  <meta name="theme-color" content="#30AB58"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="T.G.I COMO"/>
</head>
<body>
<div class="page-sm">
  <div class="auth-logo" style="text-align:center;">
    <h1>SETUP<span style="color:var(--text)">ADMIN</span></h1>
    <p>Esegui una sola volta</p>
  </div>

  <div class="card">
    <div class="card-title">— Crea account amministratore</div>
    <p style="font-size:13px;color:var(--muted2);margin-bottom:20px;line-height:1.6;">
      Questo script crea l'account admin su Firebase.<br>
      <strong style="color:var(--orange);">Eseguilo una sola volta</strong>, poi elimina questo file dal progetto.
    </p>

    <div class="alert alert-error" id="err"></div>
    <div class="alert alert-success" id="ok"></div>

    <button class="btn btn-primary" onclick="creaAdmin()">Crea Admin T.G.I</button>
  </div>
</div>

<script type="module">
  import { auth, db } from './js/firebase-config.js';
  import { createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  window.creaAdmin = async function() {
    const ADMIN_EMAIL = 'soluzioni@tgiitalia.com';
    const ADMIN_PASS  = 'TGI2026@';

    const errEl = document.getElementById('err');
    const okEl  = document.getElementById('ok');
    errEl.classList.remove('show');
    okEl.classList.remove('show');

    async function scriviProfilo(uid) {
      await setDoc(doc(db, 'utenti', uid), {
        uid,
        nome: 'T.G.I',
        cognome: 'Como',
        nomeCompleto: 'T.G.I Como',
        email: ADMIN_EMAIL,
        username: 'TGI.ITALIA',
        ruolo: 'admin',
        creato: serverTimestamp()
      });
    }

    try {
      let uid;
      try {
        // 1° caso: l'account non esiste ancora → lo creo
        const cred = await createUserWithEmailAndPassword(auth, ADMIN_EMAIL, ADMIN_PASS);
        uid = cred.user.uid;
      } catch(e) {
        if (e.code === 'auth/email-already-in-use') {
          // 2° caso: l'account esiste già → entro per recuperare l'uid e creare il profilo mancante
          const cred = await signInWithEmailAndPassword(auth, ADMIN_EMAIL, ADMIN_PASS);
          uid = cred.user.uid;
        } else {
          throw e;
        }
      }

      // In entrambi i casi scrivo/aggiorno il profilo su Firestore
      await scriviProfilo(uid);

      okEl.textContent = '✓ Admin pronto! Profilo creato su Firestore. Elimina questo file (setup.html) e accedi con TGI.ITALIA / TGI2026@';
      okEl.classList.add('show');

    } catch(e) {
      let msg = e.code ? (e.code + ' — ' + e.message) : e.message;
      if (e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential')
        msg = 'L\'account esiste già ma con una password diversa. Elimina l\'utente soluzioni@tgiitalia.com da Firebase → Authentication → Users, poi riprova.';
      errEl.textContent = msg;
      errEl.classList.add('show');
    }
  };
</script>
<script src="js/pwa-install.js"></script>
</body>
</html>
